<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8257e5;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#ff007f;stop-opacity:0.2" />
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="16" fill="url(#grad)" />
  <rect width="198" height="198" x="1" y="1" rx="15" fill="none" stroke="rgba(255, 255, 255, 0.08)" stroke-width="1.5" />
  
  <!-- Vinyl disc outer circle -->
  <circle cx="100" cy="100" r="50" fill="#161623" stroke="rgba(255, 255, 255, 0.1)" stroke-width="2"/>
  <circle cx="100" cy="100" r="40" fill="none" stroke="rgba(255, 255, 255, 0.05)" stroke-width="2"/>
  <circle cx="100" cy="100" r="30" fill="none" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1.5"/>
  
  <!-- Music note icon in the center -->
  <path d="M96 78 v38 a10 10 0 1 1 -8 -10 a10 10 0 0 1 8 10 V86 h16 V96 h-16" fill="none" stroke="#ff007f" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
